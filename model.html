<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BKK MicroFlow Digital Twin</title>
  <style>
    :root { color-scheme: dark; --cyan:#22d3ee; --red:#fb7185; --green:#34d399; --panel:rgba(8,13,28,.74); --line:rgba(148,163,184,.24); }
    * { box-sizing: border-box; }
    html, body { width:100%; height:100%; margin:0; overflow:hidden; background:#0f172a; font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; letter-spacing:0; }
    canvas { display:block; width:100%; height:100%; }
    .tooltip { position:fixed; z-index:10; width:min(310px,calc(100vw - 32px)); padding:13px 14px; border:1px solid rgba(103,232,249,.28); border-radius:8px; background:var(--panel); box-shadow:0 24px 70px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.08); backdrop-filter:blur(18px); color:#e2e8f0; opacity:0; transform:translate3d(12px,12px,0) scale(.98); pointer-events:none; transition:opacity .16s ease, transform .16s ease; }
    .tooltip.visible { opacity:1; transform:translate3d(12px,12px,0) scale(1); }
    .tooltip h2 { margin:0 0 7px; color:#f8fafc; font-size:15px; line-height:1.2; }
    .tooltip p { margin:0; color:rgba(203,213,225,.82); font-size:12px; line-height:1.45; }
    .tooltip dl { display:grid; grid-template-columns:auto 1fr; gap:5px 10px; margin:11px 0 0; font-size:11px; }
    .tooltip dt { color:rgba(148,163,184,.78); } .tooltip dd { margin:0; color:#e0f2fe; font-weight:700; }
    .info-card { position:fixed; top:90px; right:24px; z-index:8; width:min(380px,calc(100vw - 48px)); max-height:calc(100vh - 140px); overflow:auto; border:1px solid var(--line); border-radius:8px; padding:18px; background:var(--panel); box-shadow:0 32px 86px rgba(0,0,0,.46), inset 0 1px 0 rgba(255,255,255,.08); backdrop-filter:blur(22px); color:#e2e8f0; opacity:0; transform:translateX(16px); pointer-events:none; transition:opacity .22s ease, transform .22s ease; }
    .info-card.open { opacity:1; transform:translateX(0); pointer-events:auto; }
    .info-card button { position:absolute; top:12px; right:12px; width:32px; height:32px; border:1px solid rgba(148,163,184,.22); border-radius:8px; background:rgba(15,23,42,.54); color:#e2e8f0; font-size:18px; cursor:pointer; }
    .info-card h2 { margin:0 36px 8px 0; color:#f8fafc; font-size:22px; line-height:1.12; }
    .status-pill { display:inline-flex; align-items:center; gap:7px; margin:0 0 14px; border:1px solid rgba(52,211,153,.3); border-radius:999px; padding:6px 10px; background:rgba(20,184,166,.12); color:#a7f3d0; font-size:12px; font-weight:800; }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 16px var(--green); }
    .info-card h3 { margin:16px 0 7px; color:#bae6fd; font-size:12px; text-transform:uppercase; } .info-card p,.info-card li { color:rgba(226,232,240,.82); font-size:13px; line-height:1.55; } .info-card p { margin:0; } .info-card ul { margin:0; padding-left:18px; }
    .help-button { position:fixed; right:24px; bottom:24px; z-index:9; width:46px; height:46px; border:1px solid rgba(103,232,249,.34); border-radius:50%; background:rgba(8,13,28,.72); box-shadow:0 18px 56px rgba(0,0,0,.4),0 0 30px rgba(34,211,238,.16); color:#cffafe; font-size:24px; font-weight:800; cursor:pointer; backdrop-filter:blur(16px); }
    .guide { position:fixed; right:24px; bottom:82px; z-index:9; width:min(300px,calc(100vw - 48px)); border:1px solid var(--line); border-radius:8px; padding:15px; background:var(--panel); box-shadow:0 24px 70px rgba(0,0,0,.42); backdrop-filter:blur(20px); color:#e2e8f0; opacity:0; transform:translateY(12px); pointer-events:none; transition:opacity .2s ease, transform .2s ease; }
    .guide.open { opacity:1; transform:translateY(0); pointer-events:auto; } .guide h2 { margin:0 0 10px; font-size:15px; } .guide dl { display:grid; grid-template-columns:92px 1fr; gap:8px 10px; margin:0; font-size:12px; } .guide dt { color:#bae6fd; font-weight:800; } .guide dd { margin:0; color:rgba(226,232,240,.8); }
    .loading { position:fixed; inset:0; z-index:20; display:grid; place-items:center; background:#0f172a; color:#e2e8f0; transition:opacity .3s ease, visibility .3s ease; } .loading.hidden { opacity:0; visibility:hidden; } .loader-mark { width:54px; height:54px; margin:0 auto 16px; border:3px solid rgba(34,211,238,.18); border-top-color:#22d3ee; border-radius:50%; animation:spin .8s linear infinite; } @keyframes spin { to { transform:rotate(360deg); } }
    @media (max-width:720px) { .info-card{top:72px;right:12px;width:calc(100vw - 24px)}.help-button{right:14px;bottom:24px}.guide{right:12px;bottom:78px} }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.164.1/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <div class="loading" id="loading"><div><div class="loader-mark"></div><strong>Starting BKK MicroFlow digital twin</strong></div></div>
  <aside class="tooltip" id="tooltip" role="status" aria-live="polite"></aside>
  <section class="info-card" id="infoCard"><button type="button" id="closeInfo" aria-label="Close details">×</button><div id="infoContent"></div></section>
  <button class="help-button" type="button" id="helpButton" aria-label="Open interaction guide">?</button>
  <section class="guide" id="guide"><h2>Interaction Guide</h2><dl><dt>Hover</dt><dd>Inspect equipment and status.</dd><dt>Click</dt><dd>Focus camera and open details.</dd><dt>Scroll</dt><dd>Zoom in and out.</dd><dt>Right Mouse</dt><dd>Pan around the prototype.</dd><dt>Double Click</dt><dd>Reset camera view.</dd></dl></section>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.164.1/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.164.1/examples/jsm/controls/OrbitControls.js';
    import { EffectComposer } from 'https://unpkg.com/three@0.164.1/examples/jsm/postprocessing/EffectComposer.js';
    import { RenderPass } from 'https://unpkg.com/three@0.164.1/examples/jsm/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'https://unpkg.com/three@0.164.1/examples/jsm/postprocessing/UnrealBloomPass.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#0f172a');
    scene.fog = new THREE.Fog('#0f172a', 14, 34);
    const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, .1, 100);
    camera.position.set(5.8, 4.3, 7.2);
    const renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), .42, .48, .78);
    composer.addPass(bloomPass);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = .065;
    controls.enableZoom = controls.enableRotate = controls.enablePan = true;
    controls.autoRotate = true;
    controls.autoRotateSpeed = .42;
    controls.target.set(0, 1.15, 0);
    const stopAutoRotate = () => { controls.autoRotate = false; };
    ['pointerdown','wheel','keydown','touchstart'].forEach(e => addEventListener(e, stopAutoRotate, { passive:true }));

    scene.add(new THREE.AmbientLight('#b7d7ff', .44));
    const key = new THREE.DirectionalLight('#e0f2fe', 2.6);
    key.position.set(4.5, 7, 4.5); key.castShadow = true; key.shadow.mapSize.set(2048,2048);
    Object.assign(key.shadow.camera, { near:1, far:18, left:-7, right:7, top:7, bottom:-7 });
    scene.add(key);
    const fill = new THREE.DirectionalLight('#60a5fa', .9); fill.position.set(-5, 4, -3); scene.add(fill);
    const rim = new THREE.PointLight('#22d3ee', 1.8, 10); rim.position.set(-3.2, 2.2, 2.4); scene.add(rim);

    const mat = {
      acrylic:new THREE.MeshPhysicalMaterial({ color:'#dbeafe', transparent:true, opacity:.38, roughness:.08, metalness:.05, transmission:.38, thickness:.32, clearcoat:1, side:THREE.DoubleSide }),
      acrylicEdge:new THREE.MeshStandardMaterial({ color:'#bfdbfe', transparent:true, opacity:.34, roughness:.12, emissive:'#0e7490', emissiveIntensity:.08 }),
      water:new THREE.MeshPhysicalMaterial({ color:'#38bdf8', transparent:true, opacity:.56, roughness:.16, transmission:.12, clearcoat:.75, side:THREE.DoubleSide }),
      green:new THREE.MeshStandardMaterial({ color:'#047857', roughness:.48 }), blue:new THREE.MeshStandardMaterial({ color:'#1d4ed8', roughness:.45 }),
      chip:new THREE.MeshStandardMaterial({ color:'#111827', roughness:.42 }), pin:new THREE.MeshStandardMaterial({ color:'#fbbf24', roughness:.24, metalness:.7 }),
      metal:new THREE.MeshStandardMaterial({ color:'#cbd5e1', roughness:.2, metalness:.86 }), floor:new THREE.MeshStandardMaterial({ color:'#111827', roughness:.34, metalness:.18 }),
      rubber:new THREE.MeshStandardMaterial({ color:'#020617', roughness:.58 }), leaf:new THREE.MeshStandardMaterial({ color:'#7c4a21', roughness:.72 }),
      trash:new THREE.MeshStandardMaterial({ color:'#475569', roughness:.66 }), rock:new THREE.MeshStandardMaterial({ color:'#334155', roughness:.82 }),
      cyanGlow:new THREE.MeshBasicMaterial({ color:'#22d3ee', transparent:true, opacity:.23, blending:THREE.AdditiveBlending, depthWrite:false, side:THREE.DoubleSide }),
      redGlow:new THREE.MeshBasicMaterial({ color:'#fb7185', transparent:true, opacity:.3, blending:THREE.AdditiveBlending, depthWrite:false, side:THREE.DoubleSide })
    };
    const box = new THREE.BoxGeometry(1,1,1), sphere = new THREE.SphereGeometry(1,24,16), smallSphere = new THREE.SphereGeometry(.035,12,8), cyl = new THREE.CylinderGeometry(1,1,1,40), cone = new THREE.ConeGeometry(1,1,48,1,true);
    const leafShape = new THREE.Shape(); leafShape.moveTo(0,.18); leafShape.bezierCurveTo(.22,.1,.22,-.12,0,-.2); leafShape.bezierCurveTo(-.22,-.12,-.22,.1,0,.18);
    const leafGeo = new THREE.ShapeGeometry(leafShape);
    const interactive = [], animated = [], relationshipLines = [], dataParticles = [];
    const highlightMaterial = new THREE.MeshBasicMaterial({ color:'#67e8f9', transparent:true, opacity:.22, blending:THREE.AdditiveBlending, depthWrite:false, side:THREE.DoubleSide });
    const liveValues = { water:42, distance:18.3, debris:'Detected', temp:29, wifi:'Connected' };

    function cube(size, pos, material, cast=true, receive=true) { const m = new THREE.Mesh(box, material); m.scale.copy(size); m.position.copy(pos); m.castShadow = cast; m.receiveShadow = receive; return m; }
    function cylinder(radius, depth, pos, material, rot=new THREE.Euler()) { const m = new THREE.Mesh(cyl, material); m.scale.set(radius, depth, radius); m.position.copy(pos); m.rotation.copy(rot); m.castShadow = m.receiveShadow = true; return m; }
    function highlightFor(root) { const g = new THREE.Group(), glow = new THREE.Mesh(box, highlightMaterial); g.add(glow); g.userData.update = () => { const b = new THREE.Box3().setFromObject(root), s = new THREE.Vector3(), c = new THREE.Vector3(); b.getSize(s); b.getCenter(c); g.position.copy(c); glow.scale.copy(s.multiplyScalar(1.16)); }; return g; }
    function addInteractive(root, hitMeshes, metadata, focusOffset) { root.userData.metadata = metadata; root.userData.focusOffset = focusOffset; root.userData.baseScale = root.scale.clone(); root.userData.highlight = highlightFor(root); root.userData.highlight.visible = false; scene.add(root.userData.highlight); hitMeshes.forEach(m => { m.userData.owner = root; interactive.push(m); }); return root; }

    const floor = new THREE.Mesh(new THREE.CircleGeometry(9,96), mat.floor); floor.rotation.x = -Math.PI/2; floor.position.y = -.05; floor.receiveShadow = true; scene.add(floor);
    const grid = new THREE.GridHelper(13,26,'#164e63','#1e293b'); grid.position.y = -.035; grid.material.transparent = true; grid.material.opacity = .18; scene.add(grid);

    const chamber = new THREE.Group(), chamberHits = [];
    [cube(new THREE.Vector3(4.2,1.85,.06),new THREE.Vector3(0,.92,-1.05),mat.acrylic), cube(new THREE.Vector3(4.2,1.85,.06),new THREE.Vector3(0,.92,1.05),mat.acrylic), cube(new THREE.Vector3(.06,1.85,2.1),new THREE.Vector3(-2.1,.92,0),mat.acrylic), cube(new THREE.Vector3(.06,1.85,2.1),new THREE.Vector3(2.1,.92,0),mat.acrylic), cube(new THREE.Vector3(4.25,.08,2.14),new THREE.Vector3(0,.04,0),mat.acrylic)].forEach(p => { chamber.add(p); chamberHits.push(p); });
    [[0,1.88,-1.08,4.35,.08,.08],[0,1.88,1.08,4.35,.08,.08],[-2.18,1.88,0,.08,.08,2.2],[2.18,1.88,0,.08,.08,2.2],[0,.08,-1.08,4.35,.08,.08],[0,.08,1.08,4.35,.08,.08]].forEach(r => chamber.add(cube(new THREE.Vector3(r[3],r[4],r[5]),new THREE.Vector3(r[0],r[1],r[2]),mat.acrylicEdge)));
    scene.add(chamber);
    addInteractive(chamber, chamberHits, meta('Transparent Acrylic Drainage Chamber','A clear street-drain prototype box that makes water level, debris, and sensor placement visible during the demo.','Physical mockup for Bangkok side-street drainage monitoring.','The transparent chamber represents the drainage channel under a manhole cover and lets judges see blockage behavior directly.','Demo ready','Tabletop prototype',['Transparent acrylic body','Removable top access','Sized for ESP32 sensor demo'],()=>'Water flow simulated'), new THREE.Vector3(3,1.8,3.2));

    const waterGeo = new THREE.PlaneGeometry(4.02,1.9,64,20); waterGeo.rotateX(-Math.PI/2);
    const water = new THREE.Mesh(waterGeo, mat.water); water.position.y = .76; water.receiveShadow = true; scene.add(water); animated.push({ type:'water', mesh:water, geometry:waterGeo });
    const waterVolume = cube(new THREE.Vector3(4,.62,1.86),new THREE.Vector3(0,.43,0),mat.water.clone(),false,true); waterVolume.material.opacity = .22; scene.add(waterVolume);
    addInteractive(waterVolume, [waterVolume], meta('Animated Water Level','Transparent water volume with ripple motion, bubbles, and live level simulation.','Shows rising water when the drain starts clogging.','The HC-SR04 distance reading is interpreted as water height percentage.','Fluctuating','0-100%',['Current level simulation','Rippled surface','Bubble indicators'],()=>`${liveValues.water}% full`), new THREE.Vector3(2.6,1.2,2.4));
    for (let i=0;i<36;i++) { const b = new THREE.Mesh(smallSphere,new THREE.MeshBasicMaterial({ color:'#bae6fd', transparent:true, opacity:.32+Math.random()*.32, depthWrite:false })); b.position.set(THREE.MathUtils.randFloatSpread(3.5),THREE.MathUtils.randFloat(.16,.78),THREE.MathUtils.randFloatSpread(1.48)); b.scale.setScalar(THREE.MathUtils.randFloat(.65,1.7)); scene.add(b); animated.push({ type:'bubble', mesh:b, speed:THREE.MathUtils.randFloat(.14,.36), startY:b.position.y }); }

    const debris = new THREE.Group(), debrisHits = [];
    for (let i=0;i<22;i++) { const l = new THREE.Mesh(leafGeo, mat.leaf); l.position.set(THREE.MathUtils.randFloat(-.9,1.65),.84+i*.002,THREE.MathUtils.randFloat(-.58,.58)); l.rotation.set(-Math.PI/2+THREE.MathUtils.randFloat(-.25,.25),THREE.MathUtils.randFloatSpread(.4),THREE.MathUtils.randFloat(0,Math.PI*2)); l.scale.setScalar(THREE.MathUtils.randFloat(.55,1.08)); l.castShadow = true; debris.add(l); debrisHits.push(l); }
    for (let i=0;i<13;i++) { const t = cube(new THREE.Vector3(THREE.MathUtils.randFloat(.12,.32),THREE.MathUtils.randFloat(.06,.18),THREE.MathUtils.randFloat(.12,.28)),new THREE.Vector3(THREE.MathUtils.randFloat(-.65,1.55),.84,THREE.MathUtils.randFloat(-.58,.58)),mat.trash); t.rotation.set(THREE.MathUtils.randFloatSpread(.8),THREE.MathUtils.randFloatSpread(.8),THREE.MathUtils.randFloatSpread(.8)); debris.add(t); debrisHits.push(t); }
    for (let i=0;i<15;i++) { const r = new THREE.Mesh(new THREE.IcosahedronGeometry(THREE.MathUtils.randFloat(.055,.12),1), mat.rock); r.position.set(THREE.MathUtils.randFloat(-.7,1.7),.82,THREE.MathUtils.randFloat(-.62,.62)); r.castShadow = r.receiveShadow = true; debris.add(r); debrisHits.push(r); }
    scene.add(debris);
    addInteractive(debris, debrisHits, meta('Debris and Sediment Pile','Leaves, plastic blocks, and small rocks represent the waste that causes localized flooding in Bangkok side streets.','Create a visible clogging condition for the sensor demo.','The IR module flags nearby obstruction while water level rise confirms drainage risk.','Clogging risk','Accumulating',['Leaves','Trash fragments','Sediment and rocks'],()=>liveValues.debris), new THREE.Vector3(1.6,1,1.8));

    const esp32 = new THREE.Group(); esp32.position.set(-.88,2.28,-.2); esp32.rotation.x = -.08;
    const espBoard = cube(new THREE.Vector3(1.18,.065,.72),new THREE.Vector3(0,0,0),mat.green); esp32.add(espBoard);
    [cube(new THREE.Vector3(.38,.08,.28),new THREE.Vector3(-.1,.08,0),mat.chip), cube(new THREE.Vector3(.22,.07,.16),new THREE.Vector3(.36,.075,.2),mat.chip), cube(new THREE.Vector3(.22,.085,.3),new THREE.Vector3(-.68,.07,0),mat.metal), cube(new THREE.Vector3(.36,.02,.18),new THREE.Vector3(.42,.086,-.22),new THREE.MeshStandardMaterial({ color:'#a7f3d0', roughness:.38, metalness:.12 }))].forEach(p => esp32.add(p));
    for (let row=-1;row<=1;row+=2) for (let i=0;i<9;i++) esp32.add(cube(new THREE.Vector3(.028,.07,.028),new THREE.Vector3(-.46+i*.105,.085,row*.31),mat.pin));
    scene.add(esp32);
    addInteractive(esp32, [espBoard], meta('ESP32 Controller','Collects ultrasonic and infrared readings, filters noisy values, and sends the payload to Firebase over WiFi.','Central IoT controller for the MicroFlow node.','Reads GPIO signals from sensors, applies moving-average filtering, then publishes live status to the cloud.','Online','WiFi connected',['Communication: WiFi','Destination: Firebase Realtime Database','Fallback: local mock input'],()=>`WiFi ${liveValues.wifi}`), new THREE.Vector3(2,1.2,2));

    const ultrasonic = new THREE.Group(); ultrasonic.position.set(-.15,2.05,.62);
    const ultraBoard = cube(new THREE.Vector3(.84,.055,.34),new THREE.Vector3(0,0,0),mat.blue), trA = cylinder(.13,.16,new THREE.Vector3(-.22,-.03,.02),mat.metal,new THREE.Euler(Math.PI/2,0,0)), trB = cylinder(.13,.16,new THREE.Vector3(.22,-.03,.02),mat.metal,new THREE.Euler(Math.PI/2,0,0));
    ultrasonic.add(ultraBoard,trA,trB); for (let i=0;i<4;i++) ultrasonic.add(cube(new THREE.Vector3(.035,.09,.035),new THREE.Vector3(-.33+i*.08,.07,-.13),mat.pin)); scene.add(ultrasonic);
    addInteractive(ultrasonic, [ultraBoard,trA,trB], meta('HC-SR04 Ultrasonic Sensor','Measures the distance to the water surface inside the drainage chamber.','Flood detection and water-level monitoring.','Emits a 40 kHz sound pulse and calculates distance from echo return time.','Online','2-400 cm',['Accuracy: ±3 mm','Frequency: 40 kHz','Mounted facing downward'],()=>`${liveValues.distance.toFixed(1)} cm`), new THREE.Vector3(1.6,1.1,1.7));

    const ir = new THREE.Group(); ir.position.set(1.38,1.42,.82); ir.rotation.y = -.72;
    const irBoard = cube(new THREE.Vector3(.52,.055,.32),new THREE.Vector3(0,0,0),mat.blue), emitter = cylinder(.055,.1,new THREE.Vector3(-.13,.02,-.18),new THREE.MeshStandardMaterial({ color:'#f8fafc', roughness:.18, metalness:.18, emissive:'#fb7185', emissiveIntensity:.18 }),new THREE.Euler(Math.PI/2,0,0)), receiver = cylinder(.055,.1,new THREE.Vector3(.13,.02,-.18),mat.rubber,new THREE.Euler(Math.PI/2,0,0));
    ir.add(irBoard,emitter,receiver); scene.add(ir);
    addInteractive(ir, [irBoard,emitter,receiver], meta('IR Sensor Module','Detects nearby debris and blockage inside the drainage pipe.','Debris obstruction detection.','Infrared light reflects from nearby objects; a strong reflection indicates blockage.','Active','2-30 cm',['Emitter and receiver pair','Faces debris pile','Fast binary blockage signal'],()=>liveValues.debris), new THREE.Vector3(1.45,.95,1.6));

    const cloud = new THREE.Group(); cloud.position.set(-2.95,2.25,1.42);
    const cloudCore = new THREE.Mesh(sphere,new THREE.MeshStandardMaterial({ color:'#f59e0b', roughness:.35, emissive:'#f97316', emissiveIntensity:.18 })); cloudCore.scale.set(.26,.16,.18); cloud.add(cloudCore,cube(new THREE.Vector3(.58,.18,.16),new THREE.Vector3(0,-.1,0),new THREE.MeshStandardMaterial({ color:'#f97316', roughness:.4, emissive:'#f59e0b', emissiveIntensity:.12 }))); scene.add(cloud);
    addInteractive(cloud, [cloudCore], meta('Firebase Cloud','Receives ESP32 payloads for the hackathon demo and syncs live values to the web dashboard.','Realtime database layer.','Sensor payloads are pushed through WiFi and streamed to the front-end view.','Receiving packets','Cloud sync',['Realtime status updates','No custom server required','Demo-friendly fallback to mock data'],()=>'Last packet < 1s'), new THREE.Vector3(1.3,.9,1.5));

    const dash = new THREE.Group(); dash.position.set(-3.55,1.18,-1); dash.rotation.y = .44;
    const screen = cube(new THREE.Vector3(.72,.46,.035),new THREE.Vector3(0,0,0),new THREE.MeshStandardMaterial({ color:'#020617', roughness:.24, metalness:.18, emissive:'#0ea5e9', emissiveIntensity:.08 }));
    dash.add(screen); ['#22c55e','#fbbf24','#ef4444'].forEach((color,i)=>dash.add(cube(new THREE.Vector3(.08,.08,.012),new THREE.Vector3(-.22+i*.21,.05,.035),new THREE.MeshBasicMaterial({ color }),false,false))); dash.add(cube(new THREE.Vector3(.58,.025,.012),new THREE.Vector3(0,-.13,.036),new THREE.MeshBasicMaterial({ color:'#38bdf8' }),false,false)); scene.add(dash);
    addInteractive(dash, [screen], meta('Realtime Dashboard','Represents the map dashboard where city staff see green, yellow, or red drain markers without refreshing.','Operations view for district staff.','Firebase updates drive map marker color and alert status in real time.','Critical risk visible','Bangkok district view',['Green/yellow/red markers','Open data overlay concept','Staff dispatch support'],()=>liveValues.debris==='Detected'?'Red marker active':'Green marker normal'), new THREE.Vector3(1.4,1,1.5));

    function beam(type,start,end,radius,material) { const d = new THREE.Vector3().subVectors(end,start), m = new THREE.Mesh(cone, material.clone()); m.position.copy(new THREE.Vector3().addVectors(start,end).multiplyScalar(.5)); m.scale.set(radius,d.length(),radius); m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),d.clone().normalize()); scene.add(m); animated.push({ type, mesh:m, baseOpacity:material.opacity, speed:type==='irbeam'?3.8:2.5 }); return m; }
    beam('ultrabeam',new THREE.Vector3(-.15,1.92,.62),new THREE.Vector3(-.15,.8,.62),.32,mat.cyanGlow);
    beam('irbeam',new THREE.Vector3(1.22,1.35,.68),new THREE.Vector3(.8,.88,.18),.16,mat.redGlow);
    function line(start,end,color) { const l = new THREE.Line(new THREE.BufferGeometry().setFromPoints([start,end]),new THREE.LineBasicMaterial({ color, transparent:true, opacity:.32 })); l.visible = false; scene.add(l); relationshipLines.push(l); }
    line(ultrasonic.position,esp32.position,'#67e8f9'); line(ir.position,esp32.position,'#fb7185'); line(esp32.position,cloud.position,'#fbbf24'); line(cloud.position,dash.position,'#22d3ee');
    function particlePath(points,color,count,speed) { const path = new THREE.CatmullRomCurve3(points); for (let i=0;i<count;i++) { const p = new THREE.Mesh(smallSphere,new THREE.MeshBasicMaterial({ color, transparent:true, opacity:.88, blending:THREE.AdditiveBlending, depthWrite:false })); p.scale.setScalar(1.5); scene.add(p); dataParticles.push({ mesh:p, path, t:i/count, speed }); } }
    particlePath([ir.position.clone(),new THREE.Vector3(.7,1.9,.35),esp32.position.clone(),cloud.position.clone(),dash.position.clone()],'#fb7185',18,.075);
    particlePath([ultrasonic.position.clone(),new THREE.Vector3(-.42,2.18,.26),esp32.position.clone(),cloud.position.clone(),dash.position.clone()],'#67e8f9',18,.068);
    for (let i=0;i<16;i++) { const p = new THREE.Mesh(smallSphere,new THREE.MeshBasicMaterial({ color:i<8?'#67e8f9':'#fb7185', transparent:true, opacity:.88, blending:THREE.AdditiveBlending, depthWrite:false })); p.scale.setScalar(THREE.MathUtils.randFloat(.9,1.4)); scene.add(p); animated.push({ type:i<8?'ultraParticle':'irParticle', mesh:p, t:(i%8)/8, speed:i<8?.48:.72 }); }

    function meta(name,description,purpose,principle,status,range,specs,reading) { return { name, description, purpose, principle, status, range, specs, reading }; }
    const raycaster = new THREE.Raycaster(), pointer = new THREE.Vector2(), tooltip = document.getElementById('tooltip'), infoCard = document.getElementById('infoCard'), infoContent = document.getElementById('infoContent');
    let hovered = null, selected = null, focusAnimation = null;
    const defaultCamera = { position:new THREE.Vector3(5.8,4.3,7.2), target:new THREE.Vector3(0,1.15,0) };
    function owner(o) { return o?.userData?.owner || o; }
    function setHovered(next) { if (hovered === next) return; if (hovered) { hovered.userData.highlight.visible = false; hovered.scale.copy(hovered.userData.baseScale); relationshipLines.forEach(l=>l.visible=false); } hovered = next; if (hovered) { hovered.userData.highlight.userData.update(); hovered.userData.highlight.visible = true; hovered.scale.copy(hovered.userData.baseScale).multiplyScalar(1.035); if (hovered === esp32) relationshipLines.forEach(l=>l.visible=true); } }
    function tip(m) { return `<h2>${m.name}</h2><p>${m.description}</p><dl><dt>Status</dt><dd>${m.status}</dd><dt>Range</dt><dd>${m.range}</dd><dt>Reading</dt><dd>${m.reading()}</dd></dl>`; }
    function focusCamera(o) { stopAutoRotate(); const b = new THREE.Box3().setFromObject(o), c = new THREE.Vector3(); b.getCenter(c); focusAnimation = { startTime:performance.now(), duration:900, fromPosition:camera.position.clone(), toPosition:c.clone().add(o.userData.focusOffset || new THREE.Vector3(2,1.3,2)), fromTarget:controls.target.clone(), toTarget:c }; }
    function openInfo(o) { selected = o; const m = o.userData.metadata; infoContent.innerHTML = `<h2>${m.name}</h2><div class="status-pill"><span class="dot"></span>${m.status}</div><h3>Purpose</h3><p>${m.purpose}</p><h3>Working Principle</h3><p>${m.principle}</p><h3>Specifications</h3><ul>${m.specs.map(x=>`<li>${x}</li>`).join('')}</ul><h3>Live Status</h3><p>${m.reading()}</p>`; infoCard.classList.add('open'); focusCamera(o); }
    function resetCamera() { selected = null; infoCard.classList.remove('open'); focusAnimation = { startTime:performance.now(), duration:900, fromPosition:camera.position.clone(), toPosition:defaultCamera.position.clone(), fromTarget:controls.target.clone(), toTarget:defaultCamera.target.clone() }; }
    addEventListener('pointermove', e => { pointer.x = e.clientX / innerWidth * 2 - 1; pointer.y = -(e.clientY / innerHeight) * 2 + 1; tooltip.style.left = `${Math.min(e.clientX + 10, innerWidth - 320)}px`; tooltip.style.top = `${Math.min(e.clientY + 10, innerHeight - 190)}px`; raycaster.setFromCamera(pointer,camera); const hits = raycaster.intersectObjects(interactive,true), hitOwner = hits.length ? owner(hits[0].object) : null; setHovered(hitOwner); document.body.style.cursor = hitOwner ? 'pointer' : 'default'; if (hitOwner) { tooltip.innerHTML = tip(hitOwner.userData.metadata); tooltip.classList.add('visible'); } else tooltip.classList.remove('visible'); });
    addEventListener('click', () => { if (hovered) openInfo(hovered); });
    addEventListener('dblclick', resetCamera);
    document.getElementById('closeInfo').addEventListener('click', () => infoCard.classList.remove('open'));
    document.getElementById('helpButton').addEventListener('click', () => document.getElementById('guide').classList.toggle('open'));

    function updateLiveValues() { const now = performance.now()*.001; liveValues.water = Math.round(44 + Math.sin(now*.74)*8 + Math.sin(now*1.9)*2); liveValues.distance = 25 - liveValues.water*.16 + Math.sin(now*1.3)*.6; liveValues.debris = Math.sin(now*.38) > -.45 ? 'Detected' : 'Clear'; liveValues.temp = Math.round(29 + Math.sin(now*.28)*1.2); liveValues.wifi = Math.sin(now*.18) > -.92 ? 'Connected' : 'Retrying'; if (selected && infoCard.classList.contains('open')) { const live = infoContent.querySelector('h3:last-of-type + p'); if (live) live.textContent = selected.userData.metadata.reading(); } }
    setInterval(updateLiveValues, 420); updateLiveValues();

    const clock = new THREE.Clock();
    function animate() { const elapsed = clock.getElapsedTime(), delta = clock.getDelta();
      animated.forEach(item => {
        if (item.type === 'water') { const pos = item.geometry.attributes.position; for (let i=0;i<pos.count;i++) { const x=pos.getX(i), z=pos.getZ(i); pos.setY(i, Math.sin(x*2.6+elapsed*1.55)*.035 + Math.cos(z*3.2+elapsed*1.1)*.026); } pos.needsUpdate = true; item.geometry.computeVertexNormals(); }
        if (item.type === 'bubble') { item.mesh.position.y += item.speed*delta; item.mesh.position.x += Math.sin(elapsed*1.6+item.startY*5)*.0008; if (item.mesh.position.y > .78) item.mesh.position.y = .14; }
        if (item.type === 'ultrabeam' || item.type === 'irbeam') { const boost = (hovered === ultrasonic && item.type === 'ultrabeam') || (hovered === ir && item.type === 'irbeam') ? .22 : 0; item.mesh.material.opacity = item.baseOpacity + boost + Math.sin(elapsed*item.speed)*.08; item.mesh.scale.x = item.mesh.scale.z = (item.type === 'irbeam' ? .16 : .32) * (1 + Math.sin(elapsed*item.speed)*.08); }
        if (item.type === 'ultraParticle') { item.t = (item.t + item.speed*delta)%1; item.mesh.position.lerpVectors(new THREE.Vector3(-.15,1.78,.62), new THREE.Vector3(-.15,.82,.62), item.t); item.mesh.material.opacity = .25 + Math.sin(item.t*Math.PI)*.65; }
        if (item.type === 'irParticle') { item.t = (item.t + item.speed*delta)%1; item.mesh.position.lerpVectors(new THREE.Vector3(1.22,1.35,.68), new THREE.Vector3(.8,.88,.18), item.t); item.mesh.material.opacity = .25 + Math.sin(item.t*Math.PI)*.65; }
      });
      dataParticles.forEach(p => { p.t = (p.t + p.speed*delta)%1; p.mesh.position.copy(p.path.getPointAt(p.t)); p.mesh.material.opacity = .18 + Math.sin(p.t*Math.PI)*.76; });
      if (focusAnimation) { const progress = Math.min((performance.now()-focusAnimation.startTime)/focusAnimation.duration,1), eased = 1 - Math.pow(1-progress,3); camera.position.lerpVectors(focusAnimation.fromPosition, focusAnimation.toPosition, eased); controls.target.lerpVectors(focusAnimation.fromTarget, focusAnimation.toTarget, eased); if (progress >= 1) focusAnimation = null; }
      if (hovered?.userData.highlight) hovered.userData.highlight.userData.update();
      controls.update(); composer.render(); requestAnimationFrame(animate);
    }
    addEventListener('resize', () => { camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); composer.setSize(innerWidth,innerHeight); bloomPass.setSize(innerWidth,innerHeight); });
    addEventListener('beforeunload', () => { scene.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material) (Array.isArray(o.material)?o.material:[o.material]).forEach(m=>m.dispose()); }); renderer.dispose(); composer.dispose(); });
    setTimeout(() => document.getElementById('loading').classList.add('hidden'), 450);
    animate();
  </script>
</body>
</html>
